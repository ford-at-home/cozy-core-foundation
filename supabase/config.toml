# Cursor sends no Supabase JWT; auth is the HMAC signature over the raw body.
[functions.cursor-webhook]
verify_jwt = false

# Invoked by pg_cron via pg_net; guarded by RECONCILE_TOKEN when set.
[functions.reconcile-runs]
verify_jwt = false

[functions.start-workflow]
verify_jwt = true

[functions.piece-action]
verify_jwt = true

# Stripe sends no Supabase JWT; auth is the Stripe signature over the raw body.
[functions.stripe-webhook]
verify_jwt = false

[functions.create-checkout-session]
verify_jwt = true

[functions.packet-return]
verify_jwt = true
